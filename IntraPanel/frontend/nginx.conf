server {
    listen 80;

    # Solo i tre IP statici della LAN Intrawelt
    allow 192.168.10.73;
    allow 192.168.10.74;
    allow 192.168.10.75;
    deny all;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy verso Flask per le route API
    location ~* ^/(upload|save|download|get-login|trex) {
        proxy_pass http://odoo_service:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: tutto il resto serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
