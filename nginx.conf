server {
    listen 80;
    server_name convertitore-ruolini;

    allow 192.168.10.73;
    allow 192.168.10.74;
    allow 192.168.10.75;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
