server {
    listen 80;
    server_name convertitore-ruolini;

    allow 192.168.10.73;
    allow 192.168.10.74;
    allow 192.168.10.75;
    deny all;

    # build React pubblicata fuori dalla home, leggibile da www-data
    root /var/www/convertitore-ruolini;
    index index.html;

    # solo le rotte applicative vanno al backend Flask
    location ~ ^/(get-login|trex|upload|save|download) {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # tutto il resto: file statici dal disco, con fallback SPA su index.html
    location / {
        try_files $uri /index.html;
    }
}
